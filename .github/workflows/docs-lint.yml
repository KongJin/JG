name: Docs Lint

on:
  pull_request:
    paths:
      - "docs/**"
      - "AGENTS.md"
      - ".codex/skills/jg-*/**"
      - "tools/*/README.md"
      - "tools/docs-lint/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs lint
        run: npm run docs:lint
