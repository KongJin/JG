<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;family=Public+Sans:wght@300..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        'hangar-canvas': '#111827',
                        'signal-orange': '#F59E0B',
                        'command-blue': '#5EB6FF',
                        'zinc-800': '#27272a',
                        'zinc-900': '#18181b',
                        'zinc-950': '#09090b',
                    },
                    fontFamily: {
                        headline: ["Space Grotesk", "sans-serif"],
                        display: ["Space Grotesk", "sans-serif"],
                        body: ["IBM Plex Sans", "sans-serif"],
                        label: ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .tactical-inset {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.6);
        }
        .scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(94, 182, 255, 0.05) 50%);
            background-size: 100% 4px;
        }
        .bolt {
            width: 6px;
            height: 6px;
            background: #3f3f46;
            border-radius: 1px;
            box-shadow: inset -1px -1px 1px rgba(0,0,0,0.5), 1px 1px 1px rgba(255,255,255,0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-zinc-950 text-zinc-100 font-body antialiased min-h-screen overflow-hidden">
<!-- Background Lobby (Blurred/Dimmed) -->
<div class="fixed inset-0 z-0 flex flex-col opacity-30 grayscale blur-sm">
<!-- TopAppBar Placeholder -->
<header class="sticky top-0 w-full z-50 flex justify-between items-center px-6 h-16 backdrop-blur-sm bg-zinc-950/90 border-b border-zinc-800">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-zinc-800 border border-zinc-700"></div>
<span class="font-mono text-lg font-black italic tracking-tighter text-amber-500">STRAT_COMMAND</span>
</div>
<span class="material-symbols-outlined text-zinc-500">settings</span>
</header>
<!-- Mock Lobby Content -->
<main class="flex-1 p-4 grid grid-cols-1 gap-4">
<div class="bg-zinc-900 h-32 border border-zinc-800 p-4">
<div class="flex justify-between items-start">
<div class="h-4 w-32 bg-zinc-800"></div>
<div class="h-4 w-12 bg-zinc-800"></div>
</div>
</div>
<div class="bg-zinc-900 h-32 border border-zinc-800 p-4"></div>
<div class="bg-zinc-900 h-32 border border-zinc-800 p-4"></div>
<div class="bg-zinc-900 h-32 border border-zinc-800 p-4"></div>
</main>
<!-- BottomNavBar Placeholder -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-2 pb-safe bg-zinc-950 border-t border-zinc-800">
<div class="flex flex-col items-center justify-center text-zinc-600"><span class="material-symbols-outlined">sports_esports</span></div>
<div class="flex flex-col items-center justify-center text-zinc-600"><span class="material-symbols-outlined">shield</span></div>
<div class="flex flex-col items-center justify-center text-zinc-600"><span class="material-symbols-outlined">radar</span></div>
<div class="flex flex-col items-center justify-center text-zinc-600"><span class="material-symbols-outlined">forum</span></div>
</nav>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 z-[60] bg-zinc-950/80 backdrop-blur-md flex items-center justify-center p-6">
<!-- Tactical Modal Panel -->
<div class="w-full max-w-md bg-zinc-900 border-4 border-zinc-800 relative shadow-2xl overflow-hidden">
<!-- Decorative Bolts -->
<div class="absolute top-2 left-2 bolt"></div>
<div class="absolute top-2 right-2 bolt"></div>
<div class="absolute bottom-2 left-2 bolt"></div>
<div class="absolute bottom-2 right-2 bolt"></div>
<!-- Scanline Overlay -->
<div class="absolute inset-0 scanline pointer-events-none opacity-20"></div>
<!-- Header Section -->
<div class="p-6 pb-4 border-b border-zinc-800 bg-zinc-900/50 relative">
<div class="flex items-center gap-2 mb-1">
<div class="w-1 h-4 bg-signal-orange"></div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-white">작전 생성</h1>
</div>
<p class="text-command-blue font-mono text-[10px] uppercase tracking-widest flex items-center gap-2">
<span class="animate-pulse">●</span> Opening new operation node
                </p>
<div class="absolute top-4 right-4 flex items-center gap-1 opacity-40">
<div class="h-1 w-4 bg-zinc-700"></div>
<div class="h-1 w-2 bg-zinc-700"></div>
</div>
</div>
<!-- Form Content -->
<div class="p-6 space-y-5">
<!-- Input: Room Name -->
<div class="space-y-1.5">
<label class="text-zinc-500 font-label text-[10px] font-bold uppercase tracking-tighter flex items-center justify-between">
<span>작전명 (Operation ID)</span>
<span class="text-command-blue">AUTO_GEN_READY</span>
</label>
<div class="relative group">
<input class="w-full bg-zinc-950 border-2 border-zinc-800 text-white font-mono px-4 py-3 focus:outline-none focus:border-command-blue transition-colors tactical-inset" type="text" value="STRAT_OPS_001"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-700">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Select: Max Players -->
<div class="space-y-1.5">
<label class="text-zinc-500 font-label text-[10px] font-bold uppercase tracking-tighter">최대 인원 (Max Units)</label>
<div class="relative">
<select class="w-full bg-zinc-950 border-2 border-zinc-800 text-white font-mono px-4 py-3 appearance-none focus:outline-none focus:border-command-blue tactical-inset">
<option>2인</option>
<option selected="">4인</option>
<option>8인</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-command-blue">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Select: Difficulty -->
<div class="space-y-1.5">
<label class="text-zinc-500 font-label text-[10px] font-bold uppercase tracking-tighter">난이도 (Threat Level)</label>
<div class="relative">
<select class="w-full bg-zinc-950 border-2 border-zinc-800 text-white font-mono px-4 py-3 appearance-none focus:outline-none focus:border-command-blue tactical-inset">
<option>쉬움</option>
<option selected="">보통</option>
<option>어려움</option>
<option>극한</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-command-blue">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Select: Access -->
<div class="space-y-1.5">
<label class="text-zinc-500 font-label text-[10px] font-bold uppercase tracking-tighter">공개 여부 (Network Status)</label>
<div class="relative">
<select class="w-full bg-zinc-950 border-2 border-zinc-800 text-white font-mono px-4 py-3 appearance-none focus:outline-none focus:border-command-blue tactical-inset">
<option selected="">공개 (Public)</option>
<option>비공개 (Private)</option>
<option>동료 한정 (Squad Only)</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-command-blue">
<span class="material-symbols-outlined">public</span>
</div>
</div>
</div>
<!-- Visual Detail Component -->
<div class="relative h-24 w-full bg-zinc-950 border border-zinc-800 flex items-center justify-center overflow-hidden">
<img class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-screen" data-alt="A tactical holographic wireframe visualization of a futuristic military hangar base, glowing in a monochromatic Command Blue against a pitch-black background. The visualization includes orbital telemetry data, structural stress points, and grid coordinates. The mood is highly technical and cold, suggesting a high-stakes strategic briefing in a dark industrial sci-fi setting. Thin horizontal scanlines and digital noise are visible across the display." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8g08YxD1bY-JD3e6pgWu8K9HmyPwKkdvy1ns8_sWXU437Xv8HNmT24KHG1fFtLUbBG0Bbxuy-Sr5IFkR2yd4nOHdo1ktQq__vZis_t7s5xfwrT3lPJz00fRXvSykyg9D8qlxW4qNK1-PwU1w03u2pcGtLwxMGkbJr75an94yNnIGxqJ1fttgaIbYBtj3WbtVcwlofKKqgvcvZsPTzStoe_ah5FCRiE_vy395m0ZUG3Ix9A8J2rb2N2xgnJj70xxQftGp0nXaPnf9d"/>
<div class="relative z-10 text-center">
<p class="font-mono text-[8px] text-command-blue/60 tracking-[0.2em] mb-1">TARGET_SECTOR_7</p>
<p class="font-headline text-xs font-bold text-white uppercase italic">Ready for deployment</p>
</div>
</div>
</div>
<!-- Action Dock -->
<div class="p-6 bg-zinc-950/50 flex flex-col gap-3">
<button class="w-full bg-signal-orange hover:bg-amber-600 active:scale-[0.98] transition-all py-4 px-6 text-zinc-950 font-display font-black text-lg flex items-center justify-center gap-2 clip-path-polygon-[0_0,100%_0,100%_70%,95%_100%,0_100%]">
                    작전 개시
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="w-full bg-transparent border-2 border-command-blue/30 text-command-blue/80 hover:bg-command-blue/5 py-3 px-6 text-sm font-mono font-bold uppercase tracking-widest flex items-center justify-center gap-2">
                    취소 (Abort)
                </button>
</div>
<!-- Footer Hardware Tag -->
<div class="bg-zinc-800 px-6 py-2 flex justify-between items-center">
<span class="text-[8px] font-mono text-zinc-500">SYSTEM_VER: 4.0.12_BUILD_JG</span>
<span class="text-[8px] font-mono text-zinc-500 tracking-tighter">ID: X7-99-ALPHA-LOBBY</span>
</div>
</div>
</div>
<!-- Screen Navigation Indicators (Mock) -->
<div class="fixed top-4 left-4 z-[70] pointer-events-none opacity-50">
<div class="text-zinc-600 text-[10px] font-mono border-l-2 border-zinc-700 pl-2">
<div>LATENCY: 24MS</div>
<div>STATUS: ONLINE</div>
</div>
</div>
</body></html>
