<!DOCTYPE html>

<html class="dark" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>방 대기실 - JG Tactical Hangar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;family=Public+Sans:wght@300;400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#F59E0B",
                        secondary: "#3B82F6",
                        surface: "#1F2937",
                        panel: "#273449",
                        background: "#111827"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "display": ["Space Grotesk"],
                        "body": ["IBM Plex Sans"],
                        "label": ["Public Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #111827;
            font-family: 'IBM Plex Sans', sans-serif;
            color: #E5E7EB;
        }
        .header-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-[844px] max-w-[390px] mx-auto overflow-hidden border-x border-zinc-800 shadow-2xl">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-4 h-14 bg-zinc-950/80 backdrop-blur-md docked full-width top-0 border-b-2 border-zinc-800 dark:border-zinc-800 transition-colors">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-orange-500" data-icon="arrow_back">arrow_back</span>
<h1 class="font-mono tracking-tighter uppercase font-bold text-sm text-orange-500">ROOM_LOBBY: 07-GAMMA</h1>
</div>
<div class="text-orange-500 font-black tracking-widest text-lg font-mono">#492-X</div>
</header>
<!-- Main Canvas -->
<main class="flex-1 px-4 py-6 space-y-6 overflow-y-auto pb-32">
<!-- Room Header Section -->
<section class="space-y-1">
<div class="flex items-end justify-between">
<h2 class="text-2xl font-bold header-font tracking-tight text-white">친구와 한 판</h2>
<div class="bg-zinc-800 px-2 py-0.5 rounded text-[10px] font-mono text-zinc-400 border border-zinc-700">LV. 보통</div>
</div>
<div class="flex items-center gap-3 text-xs font-mono">
<div class="flex items-center gap-1 text-orange-500">
<span class="material-symbols-outlined text-sm" data-icon="groups">groups</span>
<span class="font-bold">2/4</span>
</div>
<div class="h-1 w-1 rounded-full bg-zinc-600"></div>
<div class="text-zinc-400 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] animate-pulse" data-icon="radar">radar</span>
                    참가자 대기 중
                </div>
</div>
</section>
<!-- Participant Grid -->
<section class="grid grid-cols-2 gap-3">
<!-- Slot 1: SOL (Local Player) -->
<div class="relative bg-panel border-2 border-blue-500/50 p-4 rounded-lg flex flex-col items-center justify-center space-y-3 aspect-square overflow-hidden">
<div class="absolute top-0 right-0 bg-blue-500 text-white text-[9px] px-2 py-0.5 font-bold tracking-tighter">LOCAL</div>
<div class="w-16 h-16 rounded bg-zinc-800 overflow-hidden border border-zinc-700">
<img alt="Pilot SOL" class="w-full h-full object-cover" data-alt="A highly detailed close-up portrait of a futuristic tactical pilot named SOL, wearing a dark matte carbon fiber helmet with integrated blue HUD lighting elements. The background is a dim, industrial hangar interior with orange glowing pipes and structural steel. The visual style is sharp, high-contrast, and cinematic, emphasizing a serious military-grade science fiction atmosphere with deep shadows and metallic textures." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBE3_x5t2XpfXsFPCpS9x5FqHmc8Bx4h6-pyt4y839uobGOuxTkXcoX-hA-iJHhpj5ahUldfO-cwbqDHTxSd6MCC4e04bFkwwo4crUW0nO2orzI4GXQJ-o9hy3rt4SmE9O3UQzjcT_ZsqNSn2icG2PHmNbVz1PkgqhjQBjrhwotBZqXoNYbIqf6TcPuBBpMqdt62jublnlN6Hlqb28jVF-bRrv20yyd17JNaSH0l464u0c_v_2fYffJJDtZ9j6o3R4Sxk-kw8DmeseX"/>
</div>
<div class="text-center">
<p class="font-bold header-font text-white">SOL</p>
<p class="text-[10px] font-mono text-blue-400 font-bold uppercase">READY</p>
</div>
</div>
<!-- Slot 2: JUN -->
<div class="relative bg-surface border border-zinc-700 p-4 rounded-lg flex flex-col items-center justify-center space-y-3 aspect-square">
<div class="w-16 h-16 rounded bg-zinc-800 overflow-hidden border border-zinc-700">
<img alt="Pilot JUN" class="w-full h-full object-cover" data-alt="A detailed portrait of a science fiction character named JUN, wearing a tactical headset and a grey synthetic undersuit. The lighting is cold and clinical, coming from the side to highlight the facial features and the metallic hardware. The background features blurred hangar equipment and glowing console screens in a dark, atmospheric setting. The overall mood is focused and ready for combat, following a practical military sci-fi aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDD7l7qvqr9etoyQ3OtSH0RKDSABuYAkhFE_4GBK1bmbsg95FPMyZkL58Mf9-oIc_w9RUCKx8h9MDPdG6wn8oTHntNRrb5nJoS9ghv-qFffW71Mqrfngmn_f_BXkbHXkTWw0-SVcd33FwyBW2W4eUOJ8_LLNRA-8zmC48Da_uUrwp2fSxbzHe420gXPWDlc9f-JaWwpGYaFE1tBrar_eBdynYJUBnffUQFCQlagWkOWJPsgmHRkExKi_1dFeT3AXOYud4dmbVwe3hsL"/>
</div>
<div class="text-center">
<p class="font-bold header-font text-white">JUN</p>
<p class="text-[10px] font-mono text-zinc-500 font-bold uppercase">WAITING</p>
</div>
</div>
<!-- Slot 3: Empty -->
<div class="border-2 border-dashed border-zinc-800 bg-transparent p-4 rounded-lg flex flex-col items-center justify-center space-y-2 aspect-square">
<div class="w-12 h-12 rounded-full border border-zinc-800 flex items-center justify-center bg-zinc-900/50">
<span class="material-symbols-outlined text-zinc-700" data-icon="person_add">person_add</span>
</div>
<p class="text-[11px] font-mono text-zinc-600 font-bold uppercase">참가 대기</p>
</div>
<!-- Slot 4: Empty -->
<div class="border-2 border-dashed border-zinc-800 bg-transparent p-4 rounded-lg flex flex-col items-center justify-center space-y-2 aspect-square">
<div class="w-12 h-12 rounded-full border border-zinc-800 flex items-center justify-center bg-zinc-900/50">
<span class="material-symbols-outlined text-zinc-700" data-icon="person_add">person_add</span>
</div>
<p class="text-[11px] font-mono text-zinc-600 font-bold uppercase">참가 대기</p>
</div>
</section>
<!-- Personal Controls Area -->
<section class="space-y-4">
<div class="bg-surface border border-zinc-800 p-4 rounded-xl space-y-4">
<!-- Team Choice -->
<div class="space-y-2">
<label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest font-mono">진영 선택 / TEAM SELECT</label>
<div class="grid grid-cols-2 gap-2">
<button class="flex items-center justify-center gap-2 py-3 bg-zinc-900 border border-zinc-700 text-zinc-500 rounded font-bold transition-all active:scale-95">
<div class="w-2 h-2 rounded-full bg-red-600"></div>
                            RED
                        </button>
<button class="flex items-center justify-center gap-2 py-3 bg-blue-500/10 border border-blue-500 text-blue-500 rounded font-bold transition-all active:scale-95 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
<div class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                            BLUE
                        </button>
</div>
</div>
<!-- Deck Summary -->
<div class="space-y-2 pt-2 border-t border-zinc-800">
<label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest font-mono">로드아웃 현황 / LOADOUT</label>
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-zinc-400" data-icon="layers">layers</span>
<span class="text-sm font-medium text-zinc-300">저장된 유닛 4/8</span>
</div>
<div class="flex items-center gap-1.5 px-2 py-1 bg-emerald-500/10 border border-emerald-500/30 rounded">
<div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
<span class="text-[10px] font-bold text-emerald-500 uppercase">조건 충족</span>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Dock -->
<div class="fixed bottom-0 left-0 w-full z-50 flex flex-col gap-3 p-4 bg-zinc-950/90 backdrop-blur-xl border-t-2 border-zinc-800">
<div class="flex gap-3">
<button class="flex-1 py-4 bg-orange-500 hover:bg-orange-600 text-black font-black uppercase tracking-tighter rounded-lg shadow-lg shadow-orange-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined font-bold" data-icon="check_circle">check_circle</span>
                준비 완료
            </button>
<button class="px-6 py-4 bg-zinc-900 border border-zinc-800 text-zinc-400 font-bold uppercase tracking-tight rounded-lg active:scale-[0.98] transition-all flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
</button>
</div>
</div>
<!-- BottomNavBar (Inactive as we are in a focused room lobby) -->
<nav class="fixed bottom-0 left-0 w-full z-[60] flex justify-around items-center h-20 px-2 pb-safe bg-zinc-950/90 backdrop-blur-xl border-t-2 border-zinc-800 hidden">
<div class="flex flex-col items-center justify-center bg-orange-500/10 text-orange-500 border-t-2 border-orange-500 px-2 py-1">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="font-mono text-[10px] tracking-tight font-black uppercase">LOBBY</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-600 px-2 py-1">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
<span class="font-mono text-[10px] tracking-tight font-black uppercase">LOADOUT</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-600 px-2 py-1">
<span class="material-symbols-outlined" data-icon="query_stats">query_stats</span>
<span class="font-mono text-[10px] tracking-tight font-black uppercase">INTEL</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-600 px-2 py-1">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
<span class="font-mono text-[10px] tracking-tight font-black uppercase">READY</span>
</div>
</nav>
</body></html>
